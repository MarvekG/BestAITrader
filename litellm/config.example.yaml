model_list:
  - model_name: gpt-4o-mini
    litellm_params:
      <<: &shared_litellm_params
        model: deepseek/deepseek-v4-flash
        api_key: sk-your-provider-key
        api_base: https://api.deepseek.com
        extra_headers:
          User-Agent: opencode/1.17.9 (linux 6.18.33.1-microsoft-standard-WSL2; x64) ai-sdk/provider-utils/4.0.23 runtime/bun/1.3.14
      temperature: 0.2
      extra_body:
        thinking:
          type: disabled

  - model_name: openai-compatible
    litellm_params:
      <<: *shared_litellm_params
      temperature: 0.2
      extra_body:
        thinking:
          type: disabled

  - model_name: openai-compatible-thinking
    litellm_params:
      <<: *shared_litellm_params
      extra_body:
        thinking:
          type: enabled

general_settings:
  master_key: sk-litellm-gateway-key
  database_url: postgresql://tradeuser:tradepassword@postgres:5432/litellm
